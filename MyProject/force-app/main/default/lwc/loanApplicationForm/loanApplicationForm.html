<template>
    <lightning-card title="Loan Application Form">
        <div class="slds-p-around_medium">

            <lightning-input
                label="Applicant Name"
                onchange={handleNameChange}>
            </lightning-input>

            <lightning-input
                type="number"
                label="Loan Amount"
                onchange={handleAmountChange}>
            </lightning-input>

            <br/>

            <lightning-button
                variant="brand"
                label="Submit"
                onclick={handleSubmit}>
            </lightning-button>

        </div>
    </lightning-card>
</template>
