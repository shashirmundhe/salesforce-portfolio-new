<template>
    <lightning-card title="Student Form">

        <div class="slds-m-around_medium">

            <lightning-input label="Name" onchange={handleName}></lightning-input>

            <lightning-input label="Age" type="number" onchange={handleAge}></lightning-input>

            <lightning-input label="Course" onchange={handleCourse}></lightning-input>

            <lightning-input label="Email" onchange={handleEmail}></lightning-input>

            <lightning-input label="Phone" onchange={handlePhone}></lightning-input>

            <lightning-input label="Address" onchange={handleAddress}></lightning-input>

            <br />

            <lightning-button label="Add Student" onclick={addStudent}></lightning-button>

        </div>

        <template if:true={student}>
            <div class="slds-m-around_medium">
                <p><b>Name:</b> {student.name}</p>
                <p><b>Age:</b> {student.age}</p>
                <p><b>Course:</b> {student.course}</p>
                <p><b>Email:</b> {student.email}</p>
                <p><b>Phone:</b> {student.phone}</p>
                <p><b>Address:</b> {student.address}</p>
            </div>
        </template>

    </lightning-card>
</template>
